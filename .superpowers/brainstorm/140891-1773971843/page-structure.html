<h2>Vue 頁面結構</h2>
<p class="subtitle">原本 6 個獨立 HTML，轉 Vue 後怎麼組織？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>SPA 單頁應用（推薦 ✦）</h3>
      <p>所有頁面用 Vue Router 管理，頁面切換有<strong>炫酷轉場動畫</strong>（像是星際穿越、蟲洞效果）。不重新載入頁面，體驗更流暢。彩蛋狀態可以跨頁保持（例如 Konami Code 啟動後切頁不會消失）。</p>
      <div style="margin-top:8px;padding:8px 12px;background:rgba(0,255,136,0.1);border-left:3px solid #0f8;font-size:13px;color:rgba(255,255,255,0.7);">
        適合這個專案：頁面少、互動多、彩蛋需要全域狀態
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>多頁分離（保持原結構）</h3>
      <p>每個頁面仍是獨立入口，各自掛載 Vue 實例。更接近原本的體驗，但頁面切換是傳統的整頁重載，轉場動畫較受限，彩蛋狀態無法跨頁共享。</p>
      <div style="margin-top:8px;padding:8px 12px;background:rgba(255,255,255,0.05);border-left:3px solid rgba(255,255,255,0.2);font-size:13px;color:rgba(255,255,255,0.5);">
        適合：需要保持原本 URL 結構、或未來要加 SSR
      </div>
    </div>
  </div>
</div>
